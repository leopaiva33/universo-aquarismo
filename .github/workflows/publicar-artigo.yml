name: Publicar Artigo Automaticamente

on:
  # Rodar manualmente pelo painel do GitHub Actions
  workflow_dispatch:

  # Rodar automaticamente toda segunda, quarta e sexta às 9h (horário de Brasília = 12h UTC)
  schedule:
    - cron: '0 12 * * 1,3,5'

jobs:
  gerar-e-publicar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências Python
        run: pip install anthropic httpx

      - name: Gerar artigo
        id: gerar
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: python scripts/gerar_artigo.py

      - name: Verificar se há artigo novo
        id: check
        run: |
          if git diff --quiet && git diff --staged --quiet; then
            echo "sem_artigo=true" >> $GITHUB_OUTPUT
          else
            echo "sem_artigo=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit e push do artigo
        if: steps.check.outputs.sem_artigo == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog/ public/images/blog/
          git commit -m "feat: novo artigo publicado automaticamente via GitHub Actions"
          git push
